<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Domino’s NZ Promo Codes and Deals</title>
  <meta name="description" content="Latest Domino’s NZ promo codes, vouchers, pickup deals and delivery offers." />
  <meta name="robots" content="index, follow" />
  <link rel="canonical" href="https://tdbnz-coding.github.io/foodgenerator/dominos.html" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" />
  <style>
    body {
      background: linear-gradient(135deg, #0f1115, #111827 45%, #0a0a0a);
      color: #fff;
      font-family: "Segoe UI", sans-serif;
      min-height: 100vh;
    }
    .glass {
      background: rgba(255,255,255,0.06);
      backdrop-filter: blur(14px);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 18px;
      box-shadow: 0 12px 40px rgba(0,0,0,0.35);
    }
    .deal-card {
      height: 100%;
      overflow: hidden;
    }
    .deal-image {
      width: 100%;
      height: 210px;
      object-fit: cover;
      background: #111;
    }
    .deal-body {
      padding: 1rem;
    }
    .deal-title {
      font-size: 1.1rem;
      font-weight: 700;
      margin-bottom: 0.4rem;
    }
    .deal-desc {
      color: rgba(255,255,255,0.82);
      margin-bottom: 0.8rem;
    }
    .deal-tag {
      display: inline-block;
      padding: 0.25rem 0.6rem;
      border-radius: 999px;
      font-size: 0.8rem;
      font-weight: 700;
      background: rgba(13,202,240,0.16);
      color: #8de3ff;
      margin-bottom: 0.75rem;
    }
    .voucher-box {
      background: rgba(255,255,255,0.05);
      border-radius: 12px;
      padding: 0.7rem 0.9rem;
      margin-top: 0.8rem;
    }
    .voucher-label {
      font-size: 0.8rem;
      color: rgba(255,255,255,0.7);
      margin-bottom: 0.2rem;
    }
    .voucher-code {
      font-size: 1.15rem;
      font-weight: 800;
      color: #ffd166;
      letter-spacing: 1px;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <main class="container py-4 py-md-5">
    <section class="glass p-4 mb-4 text-center">
      <h1 class="display-5 fw-bold mb-3">Domino’s New Zealand Promo Codes and Deals</h1>
    </section>

    <section class="mb-5">
      <h2 class="h3 fw-bold mb-3">National Deals</h2>
      <div class="row g-4" id="nationalDealsRow"></div>
    </section>

    <section class="mb-5">
      <h2 class="h3 fw-bold mb-3">Pickup and Delivery Deals</h2>
      <div class="row g-4" id="localDealsRow"></div>
    </section>

    <section class="glass p-4">
      <h3 class="h5 fw-bold mb-3">Source</h3>
      <p class="mb-0 text-white-50">Deals are from Domino</p>
    </section>
  </main>

  <script>
    function copyDealCode(code, element) {
      navigator.clipboard.writeText(code).then(() => {
        const original = element.textContent;
        element.textContent = "Copied";
        setTimeout(() => {
          element.textContent = original;
        }, 1400);
      }).catch(() => {});
    }

    function createVoucherBox(code) {
      if (!code) return "";
      return `
        <div class="voucher-box">
          <div class="voucher-label">Voucher Code</div>
          <div class="voucher-code" onclick="copyDealCode('${code}', this)" title="Click to copy">${code}</div>
        </div>
      `;
    }

    function renderNationalDeals(deals) {
      const container = document.getElementById("nationalDealsRow");
      container.innerHTML = deals.map(deal => `
        <div class="col-12 col-md-6 col-xl-3">
          <div class="glass deal-card">
            <img src="${deal.image}" alt="${deal.title}" class="deal-image" loading="lazy">
            <div class="deal-body">
              <div class="deal-title">${deal.title}</div>
              <div class="deal-desc">${deal.desc}</div>
              <div class="d-grid">
                <a href="${deal.cta_link}" class="btn btn-success" target="_blank" rel="noopener">${deal.cta_copy || "ORDER NOW"}</a>
              </div>
              ${createVoucherBox(deal.voucherCode)}
            </div>
          </div>
        </div>
      `).join("");
    }

    function renderLocalDeals(deals) {
      const container = document.getElementById("localDealsRow");
      container.innerHTML = deals.map(deal => `
        <div class="col-12 col-md-6 col-xl-3">
          <div class="glass deal-card">
            <div class="deal-body">
              <div class="deal-tag">${deal.tag || deal.serviceMethodType || "Offer"}</div>
              <div class="deal-title">${deal.title}</div>
              <div class="deal-desc">${deal.desc}</div>
              <div class="d-grid">
                <a href="${deal.cta_link}" class="btn btn-success" target="_blank" rel="noopener">${deal.cta_copy || "ORDER NOW"}</a>
              </div>
              ${createVoucherBox(deal.voucherCode)}
            </div>
          </div>
        </div>
      `).join("");
    }

    async function loadDeals() {
      const res = await fetch("./deals.json", { cache: "no-store" });
      if (!res.ok) throw new Error("Failed to load deals.json");
      const data = await res.json();
      renderNationalDeals(data.nationalDeals || []);
      renderLocalDeals(data.localOffers || []);
    }

    loadDeals().catch(err => {
      console.error(err);
      document.getElementById("nationalDealsRow").innerHTML =
        '<div class="col-12"><div class="alert alert-warning">Could not load deals.</div></div>';
    });
  </script>
</body>
</html>

name: Update Domino's Deals

on:
  workflow_dispatch:
  schedule:
    - cron: "0 */6 * * *"

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Show repo structure
        run: |
          pwd
          ls -la
          ls -la foodgenerator || true
          ls -la foodgenerator/scripts || true

      - name: Run Domino's deals updater
        run: node foodgenerator/scripts/update-dominos-deals.js

      - name: Commit updated deals.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add foodgenerator/deals.json
          git diff --staged --quiet || git commit -m "Update Domino's deals"
          git push
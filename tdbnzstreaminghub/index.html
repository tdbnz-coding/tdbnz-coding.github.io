<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Redirecting...</title>
  <meta http-equiv="refresh" content="2; url=https://123watchmovies.xyz/">

  <style>
    body {
      margin: 0;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #0f0f0f, #1a1a1a);
      font-family: Arial, sans-serif;
      color: #fff;
      text-align: center;
    }

    .box {
      padding: 40px 60px;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 12px;
      backdrop-filter: blur(10px);
      animation: fadeIn 1.2s ease-out;
    }

    h1 {
      font-size: 2rem;
      margin-bottom: 10px;
    }

    p {
      font-size: 1rem;
      opacity: 0.8;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>
  <div class="box">
    <h1>Redirecting…</h1>
    <p>You’re being sent to Thomas's Site <strong>123watchmovies.xyz</strong></p>
  </div>

  <script>
    setTimeout(() => {
      window.location.href = "https://123watchmovies.xyz/";
    }, 2000);
  </script>
</body>
</html>

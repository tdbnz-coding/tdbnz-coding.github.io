<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>tdbnz Streaming Hub</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<header>tdbnz Streaming Hub</header>

<section class="section">
  <h2>🔍 Search</h2>
  <input id="searchInput" type="text" placeholder="Search for a movie or TV show..." />
  <button id="searchBtn">Search</button>

  <div id="searchResults" class="grid"></div>
</section>

<!-- TV Seasons + Episodes -->
<section class="section" id="tvSection" style="display:none;">
  <h2 id="tvTitle">TV Show</h2>
  <div id="seasonList"></div>
  <div id="episodeList" class="grid"></div>
</section>

<!-- Player Modal -->
<div id="playerModal">
  <span id="closeBtn">✖</span>
  <iframe id="playerFrame" allowfullscreen></iframe>
</div>

<script src="script.js"></script>
</body>
</html>
